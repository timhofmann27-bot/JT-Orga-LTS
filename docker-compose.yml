services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jt-orga-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000"
    volumes:
      - ./data:/app/data
    networks:
      - caddy
    healthcheck:
      test: ["CMD", "node", "-e", "http.get('http://127.0.0.1:'+(process.env.PORT||3000)+'/api/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  caddy:
    name: caddy
    external: true
